name: Release

on:
  workflow_run:
    workflows: ["Test"]
    types: [completed]
    branches: [main]

jobs:
  prepare:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.release_number.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Get package version
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "cargo_version=$VERSION" >> "$GITHUB_OUTPUT"
          # Extract major.minor prefix (e.g., "0.2" from "0.2.0")
          MAJOR_MINOR=$(echo "$VERSION" | sed 's/\.[^.]*$//')
          echo "major_minor=$MAJOR_MINOR" >> "$GITHUB_OUTPUT"

      - name: Compute next release number
        id: release_number
        env:
          GH_TOKEN: ${{ github.token }}
          MAJOR_MINOR: ${{ steps.version.outputs.major_minor }}
        run: |
          # Find latest patch version for this major.minor (e.g., v0.2.*)
          LAST_PATCH=$(gh release list --json tagName --jq "[.[] | .tagName | select(startswith(\"v${MAJOR_MINOR}.\")) | ltrimstr(\"v${MAJOR_MINOR}.\") | tonumber] | max // 0")
          NEXT_PATCH=$((LAST_PATCH + 1))
          TAG="v${MAJOR_MINOR}.${NEXT_PATCH}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Next release: $TAG"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: false
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: true
            archive: tar.gz
          - target: x86_64-apple-darwin
            runner: macos-latest
            cross: false
            archive: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-latest
            cross: false
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            cross: false
            archive: zip
          - target: aarch64-pc-windows-msvc
            runner: windows-latest
            cross: false
            archive: zip
    runs-on: ${{ matrix.runner }}
    env:
      TAG: ${{ needs.prepare.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (cargo)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../rustenati-${{ env.TAG }}-${{ matrix.target }}.tar.gz rustenati
          cd ../../..

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/rustenati.exe" -DestinationPath "rustenati-${{ env.TAG }}-${{ matrix.target }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustenati-${{ matrix.target }}
          path: rustenati-${{ env.TAG }}-${{ matrix.target }}.*

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          gh release create "$TAG" \
            artifacts/* \
            --title "$TAG" \
            --generate-notes
